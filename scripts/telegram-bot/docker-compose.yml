services:
  ruflo-bot:
    build: .
    image: ruflo-telegram-bot:latest
    container_name: ruflo-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3456:3456"
    volumes:
      # All persistent state (subscriptions, referrals, bankroll, sessions, etc.) lives here.
      # bot.js resolves every JSON state file under STATE_DIR (defaults to /app/data inside the container).
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3456/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
